<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Hookah</title>
    <link rel="stylesheet" href="css/hookah.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.1/css/all.css"
      integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <div class="header__hookah">
        <h2>Кальяни</h2>
      </div>
    </header>
    <main>
      <div class="container">
        <div class="menu">
          <div class="menu__title">
            <h3>Standart</h3>
          </div>
          <div class="menu__item">
            <p>Serbetli<span>200</span></p>
            <p>Alfakher<span>200</span></p>
            <p>Buta<span>200</span></p>
          </div>

          <div class="menu__title">
            <h3>Premium</h3>
          </div>
          <div class="menu__item">
            <p>Fumari<span>250</span></p>
            <p>Dark Side<span>300</span></p>
            <p>Tangiers<span>350</span></p>
            <p>Starbuzz<span>250</span></p>
          </div>

          <div class="menu__title">
            <h3>Bowl & Liquid</h3>
          </div>
          <div class="menu__item">
            <p>Grapefruit<span>75</span></p>
            <p>Orange<span>75</span></p>
            <p>Juice<span>30</span></p>
            <p>Milk<span>30</span></p>
            <p>Wine<span>60</span></p>
            <p>Absinthe<span>110</span></p>
            <p>Mojito<span>45</span></p>
            <p>Liquor<span>90</span></p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
